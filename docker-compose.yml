services:
  # TODO: проверить этот файл на мелкие детали я могу прочитать и понять что тут 
  # написано но я имею ввиде очень мелких деталей и что еще может пригодится или как еще лучше написать

  backend:
    build:
      context: ./backend/app
      dockerfile: Dockerfile
    volumes:
      - ./backend/app:/app
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    expose:
      - "8000"

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 80
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend