<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
  </head>
  <body>
    <div id="message"></div>
    <div id="chat">
      <div id="messages"></div>
    </div>
    <div id="input">
      <input
        id="msg"
        type="text"
        placeholder="Введите сообщение..."
        autocomplete="off"
      />
      <button id="send-btn">Send</button>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
