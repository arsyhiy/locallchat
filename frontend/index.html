<!DOCTYPE html>
<html>
<head>
<title>Chat</title>
</head>

<body>

<h2>Chat</h2>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">Send</button>

<script>
const chat=document.getElementById("chat");

// const ws=new WebSocket("ws://localhost:8000/ws");
const ws = new WebSocket("ws://192.168.0.107:8000/ws");

ws.onmessage=(event)=>{
    const div=document.createElement("div");

    div.textContent=event.data;

    chat.appendChild(div);

    // автопрокрутка вниз
    window.scrollTo(
        0,
        document.body.scrollHeight
    );
};

function send(){
    const input=document.getElementById("msg");

    if(!input.value.trim())
        return;

    ws.send(input.value);

    input.value="";
}
</script>

</body>
</html>
